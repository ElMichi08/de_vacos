name: de_vacos
description: "Aplicación de gestión para restaurante De Vacos Urban Grill"
version: 2.9.5+1

environment:
  sdk: ^3.7.2

dependencies:
  connectivity_plus: ^7.0.0                      # Verificación de conectividad a internet
  cupertino_icons: ^1.0.8
  esc_pos_utils_plus: ^2.0.4                     # Construcción de tickets ESC/POS
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_dotenv: 6.0.0                         # Variables de entorno
  flutter_pos_printer_platform_image_3: ^1.0.0   # Impresión térmica moderna (Android/iOS/Windows)
  flutter_slidable: ^3.1.1
  go_router: ^17.1.0                             # Navegación (usado en varias pantallas)
  image: ^4.1.3                                  # Procesamiento de imágenes
  image_picker: ^1.1.0                           # Selección de imágenes
  intl: 0.20.2                                  # Internacionalización y formatos
  path: ^1.9.1                                   # Manejo de rutas de archivos
  path_provider: ^2.1.5                          # Directorios del sistema
  permission_handler: 12.0.1                    # Permisos Bluetooth
  shared_preferences: ^2.3.3                     # Guardar preferencias (tamaño de papel)
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.6                    # Base de datos SQLite para escritorio
  supabase_flutter: ^2.5.6                       # Cliente Supabase para Flutter

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - logo.png
    - .env   # En debug se carga desde aquí; en release se usan --dart-define (ver README)
    - assets/config/branding.json

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon_app.png"
  adaptive_icon_background: "#FF9800"  # Naranja similar a AppColors.accent
  adaptive_icon_foreground: "icon_app.png"
